<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Tact's Casino</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: auto;
        }

        .login-wrap {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            margin-bottom: 14px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .login-logo h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffe566, #ffd700, #c9960c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .login-logo p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }

        .login-box {
            background: linear-gradient(145deg, #111e30, #0a1220);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 18px;
            padding: 36px 32px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.65), 0 0 40px rgba(255,215,0,0.04);
        }

        .login-tabs {
            display: flex;
            margin-bottom: 28px;
            background: rgba(0,0,0,0.35);
            border-radius: 10px;
            padding: 4px;
            gap: 4px;
        }

        .login-tab {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            border-radius: 7px;
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
            font-family: 'Inter', sans-serif;
        }

        .login-tab.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 2px 10px rgba(59,130,246,0.3);
        }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            font-size: 0.73rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 7px;
        }

        .form-group input {
            width: 100%;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            padding: 12px 14px;
            border-radius: 9px;
            font-size: 0.98rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        .form-group input::placeholder { color: #3a4f68; }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            padding-right: 44px;
        }

        .toggle-pw {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.1rem;
            padding: 4px;
            transition: color 0.2s;
            line-height: 1;
        }

        .toggle-pw:hover { color: var(--text-main); }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 14px;
            font-size: 0.98rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 16px rgba(34,197,94,0.25);
            margin-top: 6px;
            font-family: 'Inter', sans-serif;
        }

        .btn-submit:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 6px 22px rgba(34,197,94,0.3);
        }

        .btn-submit:disabled {
            background: var(--bg-hover);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-msg {
            color: #f87171;
            font-size: 0.83rem;
            margin-top: 14px;
            text-align: center;
            min-height: 18px;
        }

        .login-footer {
            text-align: center;
            margin-top: 22px;
            color: #2a3f58;
            font-size: 0.76rem;
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-logo">
            <img src="logo.png" alt="Tact's Casino Logo">
            <h1>Tact's Casino</h1>
            <p>Sign in or create a free account to play</p>
        </div>

        <div class="login-box">
            <div class="login-tabs">
                <button class="login-tab active" id="tab-login"    onclick="switchTab('login')">Login</button>
                <button class="login-tab"         id="tab-register" onclick="switchTab('register')">Create Account</button>
            </div>

            <!-- LOGIN FORM -->
            <div id="form-login">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" placeholder="Your username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password">
                </div>
                <button class="btn-submit" id="btn-login" onclick="doLogin()">Login</button>
            </div>

            <!-- REGISTER FORM -->
            <div id="form-register" style="display:none;">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" placeholder="Choose a username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <input type="password" id="reg-password" placeholder="Choose a password (min 6 chars)" autocomplete="new-password">
                        <button type="button" class="toggle-pw" onclick="togglePw('reg-password', this)" tabindex="-1">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrap">
                        <input type="password" id="reg-confirm" placeholder="Repeat your password" autocomplete="new-password">
                        <button type="button" class="toggle-pw" onclick="togglePw('reg-confirm', this)" tabindex="-1">👁️</button>
                    </div>
                </div>
                <button class="btn-submit" id="btn-register" onclick="doRegister()">Create Account</button>
            </div>

            <div class="error-msg" id="auth-error"></div>
        </div>

        <div class="login-footer">By playing you agree to our terms of service</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>
    <script src="platform.js"></script>
    <script>
        Platform.init('login');

        function togglePw(inputId, btn) {
            const input = document.getElementById(inputId);
            const show  = input.type === 'password';
            input.type  = show ? 'text' : 'password';
            btn.innerText = show ? '🙈' : '👁️';
        }

        function switchTab(tab) {
            const isLogin = tab === 'login';
            document.getElementById('tab-login').classList.toggle('active', isLogin);
            document.getElementById('tab-register').classList.toggle('active', !isLogin);
            document.getElementById('form-login').style.display    = isLogin ? '' : 'none';
            document.getElementById('form-register').style.display = isLogin ? 'none' : '';
            document.getElementById('auth-error').innerText = '';
        }

        function setError(msg) {
            document.getElementById('auth-error').innerText = msg;
        }

        function setLoading(btnId, loading, defaultText) {
            const btn = document.getElementById(btnId);
            btn.disabled  = loading;
            btn.innerText = loading ? 'Please wait...' : defaultText;
        }

        async function doLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            if (!username || !password) return setError('Please fill in all fields.');

            setLoading('btn-login', true, 'Login');
            const email = username.toLowerCase() + '@tactscasino.game';

            try {
                await firebase.auth().signInWithEmailAndPassword(email, password);
                window.location.href = 'index.html';
            } catch (e) {
                setLoading('btn-login', false, 'Login');
                if (['auth/user-not-found','auth/wrong-password','auth/invalid-credential','auth/invalid-email'].includes(e.code)) {
                    setError('Incorrect username or password.');
                } else {
                    setError('Login failed. Please try again.');
                    console.error(e);
                }
            }
        }

        async function doRegister() {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm  = document.getElementById('reg-confirm').value;

            if (!username || !password || !confirm) return setError('Please fill in all fields.');
            if (username.length < 3)  return setError('Username must be at least 3 characters.');
            if (!/^[a-zA-Z0-9_]+$/.test(username)) return setError('Username can only contain letters, numbers and underscores.');
            if (password.length < 6)  return setError('Password must be at least 6 characters.');
            if (password !== confirm)  return setError('Passwords do not match.');

            setLoading('btn-register', true, 'Create Account');
            const email = username.toLowerCase() + '@tactscasino.game';

            try {
                const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
                await cred.user.updateProfile({ displayName: username });
                await firebase.firestore().collection('users').doc(cred.user.uid).set({
                    username: username,
                    balance: 1000,
                    history: [],
                    stats: { totalWon: 0, slots: 0, sugar: 0, crash: 0, coinflip: 0, mines: 0, plinko: 0, hilo: 0 }
                });
                window.location.href = 'index.html';
            } catch (e) {
                setLoading('btn-register', false, 'Create Account');
                if (e.code === 'auth/email-already-in-use') {
                    setError('That username is already taken.');
                } else if (e.code === 'auth/weak-password') {
                    setError('Password is too weak — use at least 6 characters.');
                } else {
                    setError('Registration failed. Please try again.');
                    console.error(e);
                }
            }
        }

        // Submit on Enter key
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') return;
            const loginVisible = document.getElementById('form-login').style.display !== 'none';
            if (loginVisible) doLogin(); else doRegister();
        });
    </script>
</body>
</html>
