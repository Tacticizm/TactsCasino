<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coin Flip - Casino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar" id="sidebar-container"></div>
    <div class="main-content">
        <div class="top-bar" id="topbar-container"></div>
        <div class="game-stage">
            <div class="game-view" id="view-coinflip">
                <div class="game-header"><h2>Coin Flip</h2></div>
                <div class="coin-container">
                    <div class="coin" id="coin-element">
                        <div class="coin-face coin-front">H</div>
                        <div class="coin-face coin-back">T</div>
                    </div>
                </div>
                <div class="streak-display" id="coinflip-streak-display">Streak: 0</div><br>
                <div class="control-group">
                    <label>Bet Amount</label>
                    <input type="number" id="coinflip-bet" class="input-dark" value="10" min="1">
                </div>
                <div class="flip-controls">
                    <button class="btn-action btn-choice" id="btn-choice-heads" onclick="CoinFlipGame.selectSide('heads')">Heads</button>
                    <button class="btn-action btn-choice" id="btn-choice-tails" onclick="CoinFlipGame.selectSide('tails')">Tails</button>
                </div>
                <button class="btn-action" id="btn-coinflip-flip" disabled>Select Side to Flip</button>
                <div class="autospin-bar" style="margin-top: 12px;">
                    <select id="coinflip-autospin-count">
                        <option value="10">10 Flips</option>
                        <option value="25">25 Flips</option>
                        <option value="50" selected>50 Flips</option>
                        <option value="100">100 Flips</option>
                        <option value="500">500 Flips</option>
                        <option value="1000">1000 Flips</option>
                    </select>
                    <button class="btn-autospin" id="coinflip-btn-autospin">⚡ Autoplay</button>
                    <span class="autospin-counter" id="coinflip-autospin-counter"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>
    <script src="platform.js"></script>
    <script>
        Platform.init('coinflip');

        const CoinFlipGame = {
            isFlipping: false, selectedSide: null, streak: 0, DOM: {},
            currentRotation: 0,
            autoplay: { active: false, remaining: 0 },

            init() {
                this.DOM = {
                    coin: document.getElementById('coin-element'),
                    betInput: document.getElementById('coinflip-bet'),
                    btnFlip: document.getElementById('btn-coinflip-flip'),
                    btnHeads: document.getElementById('btn-choice-heads'),
                    btnTails: document.getElementById('btn-choice-tails'),
                    streakDisplay: document.getElementById('coinflip-streak-display'),
                    autospinBtn: document.getElementById('coinflip-btn-autospin'),
                    autospinCount: document.getElementById('coinflip-autospin-count'),
                    autospinCounter: document.getElementById('coinflip-autospin-counter')
                };
                this.DOM.btnFlip.onclick = () => this.flip();
                this.DOM.autospinBtn.onclick = () => this.toggleAutoplay();
            },

            toggleAutoplay() {
                if (this.autoplay.active) {
                    this.stopAutoplay();
                } else {
                    if (!this.selectedSide) { Platform.showAlert('Please select Heads or Tails first!', 'Autoplay'); return; }
                    if (this.isFlipping) return;
                    const count = parseInt(this.DOM.autospinCount.value);
                    this.autoplay.active = true;
                    this.autoplay.remaining = count;
                    this.DOM.autospinBtn.classList.add('active');
                    this.DOM.autospinBtn.innerText = '■ Stop';
                    this.nextAutoFlip();
                }
            },

            stopAutoplay() {
                this.autoplay.active = false;
                this.autoplay.remaining = 0;
                this.DOM.autospinBtn.classList.remove('active');
                this.DOM.autospinBtn.innerText = '⚡ Autoplay';
                this.DOM.autospinCounter.innerText = '';
            },

            nextAutoFlip() {
                if (!this.autoplay.active || this.autoplay.remaining <= 0) { this.stopAutoplay(); return; }
                const bet = parseFloat(this.DOM.betInput.value);
                if (isNaN(bet) || bet <= 0 || Platform.balance < bet) { this.stopAutoplay(); return; }
                this.DOM.autospinCounter.innerText = `${this.autoplay.remaining} left`;
                this.autoplay.remaining--;
                this.flip();
            },

            selectSide(side) {
                if(this.isFlipping) return;
                this.selectedSide = side;
                this.DOM.btnHeads.classList.toggle('selected', side === 'heads');
                this.DOM.btnTails.classList.toggle('selected', side === 'tails');
                this.DOM.btnFlip.disabled = false;
                this.DOM.btnFlip.innerText = `Flip for ${side.toUpperCase()}`;
            },

            flip() {
                if(this.isFlipping || !this.selectedSide) return;

                const bet = parseFloat(this.DOM.betInput.value);
                if(isNaN(bet) || bet <= 0 || bet > Platform.balance) return alert("Invalid Bet!");

                Platform.adjustBalance(-bet);
                this.isFlipping = true;
                this.DOM.btnFlip.disabled = true;

                const isHeads = Math.random() >= 0.5;

                // Always add 5 full rotations (1800°) so the spin is visible every flip.
                // rotateY lands on "heads" when (rotation / 180) is even — nudge by 180
                // if the base lands on the wrong face.
                let next = this.currentRotation + 1800;
                const wouldShowHeads = ((next / 180) % 2) === 0;
                if (isHeads !== wouldShowHeads) next += 180;

                this.currentRotation = next;
                this.DOM.coin.style.transform = `rotateY(${next}deg)`;

                setTimeout(() => {
                    this.isFlipping = false;
                    this.DOM.btnFlip.disabled = false;

                    if (this.selectedSide === (isHeads ? 'heads' : 'tails')) {
                        Platform.adjustBalance(bet * 2);
                        Platform.recordGame('coinflip', bet, bet * 2);
                        this.streak++;
                    } else {
                        Platform.recordGame('coinflip', bet, 0);
                        this.streak = 0;
                    }

                    this.DOM.streakDisplay.innerText = `Streak: ${this.streak}`;

                    if (this.autoplay.active) setTimeout(() => this.nextAutoFlip(), 400);
                }, 2000);
            }
        };

        CoinFlipGame.init();
    </script>
</body>
</html>
